services:
  db:         
    image: mysql:8.0
    # เอา container_name ออก Docker จะตั้งชื่อให้เองไม่ซ้ำแน่นอน
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root   
      MYSQL_DATABASE: webpj   
    ports:
      - "9000:3306"   
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    restart: always

  phpmyadmin:
    image: phpmyadmin:latest
    # เอา container_name ออกเช่นกัน
    environment:
      PMA_HOST: db    
      PMA_PORT: 3306  
      PMA_USER: root    
      PMA_PASSWORD: root    
      UPLOAD_LIMIT: 64M   
    ports:
      - "9001:80"
    depends_on:
      - db
    networks:
      - app_network
    restart: always 

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data: