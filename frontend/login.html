<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบจัดการเวลาทำงาน</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-lg" style="width: 400px;">
        <div class="card-header bg-primary text-white text-center py-3">
            <h5 class="mb-0">🔐 เข้าสู่ระบบ (Attendance)</h5>
        </div>
        <div class="card-body p-4">
            <div class="mb-3">
                <label class="form-label">ชื่อผู้ใช้งาน</label>
                <input type="text" id="username" class="form-control" placeholder="เช่น admin หรือ Emp01">
            </div>
            <div class="mb-4">
                <label class="form-label">รหัสผ่าน</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" placeholder="กรอกรหัสผ่าน">
                    <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePassword('password', 'eyeIconLogin')">
                        <span id="eyeIconLogin">👁️</span>
                    </button>
                </div>
            </div>

            <button class="btn btn-primary w-100 mb-3" onclick="handleLogin()">เข้าสู่ระบบ</button>

            <div class="text-center">
                <a href="register.html" class="text-decoration-none">ยังไม่มีบัญชี? สมัครสมาชิกที่นี่</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                const res = await axios.post('http://localhost:3000/api/login', {
                    username: user,
                    password: pass
                });

                const result = res.data;

                if (result.role) {
                    localStorage.setItem('role', result.role);
                    localStorage.setItem('employee_code', result.employee_code);

                    Swal.fire({
                        title: 'เข้าสู่ระบบสำเร็จ',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'index.html';
                    });

                } else {
                    Swal.fire(
                        'เข้าสู่ระบบไม่สำเร็จ',
                        result.error || 'ข้อมูลไม่ถูกต้อง',
                        'error'
                    );
                }

            } catch (err) {
                const msg = err.response?.data?.error || 'เกิดข้อผิดพลาดจาก server';

                Swal.fire(
                    'เข้าสู่ระบบไม่สำเร็จ',
                    msg,
                    'error'
                );
                console.error(err);
            }
        }
    </script>

</body>

</html>
